# ===========================================
# 冒险岛北斗服务端 - 假人系统配置
# ===========================================
# 本配置用于控制假人系统的行为
# 假人通过 Netty 发包实现，不占用真实玩家连接

fake-player:
  # 是否启用假人系统
  enabled: true

  # 地图配置
  # key: 地图ID, value: 假人数量
  maps:
    # === 维多利亚港 ===
    100000000: 5   # 市中心
    101000000: 3   # 射手村
    102000000: 3   # 魔法密林
    103000000: 3   # 废弃都市
    104000000: 3   # 黑暗中的明珠

    # === 天空之城 ===
    200000000: 4   # 天空之城广场

    # === 其他城镇 ===
    211000000: 3   # 神木村
    220000000: 3   # 时间神殿
    230000000: 3   # 阿里安特
    240000000: 3   # 武陵
    250000000: 3   # 地球防御本部

  # 聊天配置
  chat:
    # 是否允许假人随机说话
    enabled: true
    # 说话概率 (0.0-1.0)
    probability: 0.1
    # 说话冷却时间（秒）
    cooldown: 30
    # 预设聊天内容
    messages:
      - "今天天气不错~"
      - "有人一起组队吗？"
      - "哈哈"
      - "好无聊啊"
      - "有人在吗？"
      - "大家好！"
      - "这个游戏真好玩"
      - "我要去打怪了"
      - "谁有装备卖？"
      - "新手求带~"

  # 外观配置
  appearance:
    # 脸型 ID 池
    faces:
      male: [20000, 20001, 20002, 20003, 20004, 20005, 20006, 20007, 20008, 20009,
             20010, 20011, 20012, 20013, 20014, 20015, 20016, 20017, 20018, 20019]
      female: [21000, 21001, 21002, 21003, 21004, 21005, 21006, 21007, 21008, 21009,
               21010, 21011, 21012, 21013, 21014, 21015, 21016, 21017, 21018, 21019]

    # 发型 ID 池
    hairs:
      male: [30000, 30010, 30020, 30030, 30040, 30050, 30060, 30070, 30080, 30090,
             30100, 30110, 30120, 30130, 30140, 30150, 30160, 30170, 30180, 30190]
      female: [31000, 31010, 31020, 31030, 31040, 31050, 31060, 31070, 31080, 31090,
               31100, 31110, 31120, 31130, 31140, 31150, 31160, 31170, 31180, 31190]

    # 肤色概率权重
    skin-weights:
      NORMAL: 60    # 普通肤色
      DARK: 15      # 深色
      BLACK: 10     # 黑色
      PALE: 10      # 苍白
      BLUE: 3       # 蓝色
      GREEN: 2      # 绿色

  # 装备配置
  equipment:
    # 帽子
    hats: [1002000, 1002001, 1002002, 1002003, 1002004, 1002005, 1002006, 1002007,
           1002008, 1002009, 1002010, 1002011, 1002012, 1002013, 1002014, 1002015]

    # 脸饰
    face-accessories: [1012000, 1012001, 1012002, 1012003, 1012004, 1012005]

    # 眼饰
    eye-accessories: [1022000, 1022001, 1022002, 1022003, 1022004, 1022005]

    # 耳环
    earrings: [1032000, 1032001, 1032002, 1032003, 1032004, 1032005]

    # 上衣
    tops: [1040000, 1040001, 1040002, 1040003, 1040004, 1040005,
           1040006, 1040007, 1040008, 1040009, 1040010, 1040011]

    # 套装（连体衣）
    overalls: [1050000, 1050001, 1050002, 1050003, 1050004, 1050005]

    # 裤子/裙子
    bottoms: [1060000, 1060001, 1060002, 1060003, 1060004, 1060005]

    # 鞋子
    shoes: [1072000, 1072001, 1072002, 1072003, 1072004, 1072005,
            1072006, 1072007, 1072008, 1072009]

    # 手套
    gloves: [1082000, 1082001, 1082002, 1082003, 1082004, 1082005]

    # 盾牌
    shields: [1092000, 1092001, 1092002, 1092003, 1092004, 1092005]

    # 披风
    capes: [1102000, 1102001, 1102002, 1102003, 1102004, 1102005]

    # 武器
    weapons:
      # 单手剑
      one-handed-sword: [1302000, 1302001, 1302002, 1302003, 1302004, 1302005]
      # 单手斧
      one-handed-axe: [1312000, 1312001, 1312002, 1312003]
      # 单手钝器
      one-handed-blunt: [1322000, 1322001, 1322002, 1322003]
      # 短刀
      dagger: [1332000, 1332001, 1332002, 1332003]
      # 双刀
      dual-blade: [1342000, 1342001, 1342002]
      # 双手剑
      two-handed-sword: [1402000, 1402001, 1402002, 1402003, 1402004, 1402005]
      # 双手斧
      two-handed-axe: [1412000, 1412001, 1412002, 1412003]
      # 双手钝器
      two-handed-blunt: [1422000, 1422001, 1422002, 1422003]
      # 矛
      spear: [1432000, 1432001, 1432002, 1432003]
      # 枪
      polearm: [1442000, 1442001, 1442002, 1442003]
      # 弓
      bow: [1452000, 1452001, 1452002, 1452003]
      # 弩
      crossbow: [1462000, 1462001, 1462002, 1462003]
      # 拳套
      claw: [1472000, 1472001, 1472002, 1472003]
      # 指节
      knuckle: [1482000, 1482001, 1482002, 1482003]
      # 枪（火枪手）
      gun: [1492000, 1492001, 1492002, 1492003]

  # 职业配置
  jobs:
    # 一转职业
    first-job:
      - WARRIOR
      - MAGICIAN
      - BOWMAN
      - THIEF
      - PIRATE

    # 二转职业
    second-job:
      warrior: [FIGHTER, PAGE, SPEARMAN]
      magician: [FP_WIZARD, IL_WIZARD, CLERIC]
      bowman: [HUNTER, CROSSBOWMAN]
      thief: [ASSASSIN, BANDIT]
      pirate: [BRAWLER, GUNSLINGER]

    # 三转职业
    third-job:
      warrior: [CRUSADER, WHITEKNIGHT, DRAGONKNIGHT]
      magician: [FP_MAGE, IL_MAGE, PRIEST]
      bowman: [RANGER, SNIPER]
      thief: [HERMIT, CHIEFBANDIT]
      pirate: [MARAUDER, OUTLAW]

    # 四转职业
    fourth-job:
      warrior: [HERO, PALADIN, DARKKNIGHT]
      magician: [FP_ARCHMAGE, IL_ARCHMAGE, BISHOP]
      bowman: [BOWMASTER, MARKSMAN]
      thief: [NIGHTLORD, SHADOWER]
      pirate: [BUCCANEER, CORSAIR]

    # 等级范围配置
    level-ranges:
      first-job: {min: 10, max: 30}
      second-job: {min: 30, max: 70}
      third-job: {min: 70, max: 120}
      fourth-job: {min: 120, max: 200}

  # 名字配置
  names:
    # 前缀词库
    prefixes:
      male: ["小", "大", "老", "阿", "黑", "白", "红", "蓝", "绿", "金",
             "银", "紫", "青", "灰", "橙", "黄", "粉", "棕", "彩", "暗"]
      female: ["小", "可", "甜", "美", "仙", "灵", "雪", "月", "花", "雨",
               "梦", "星", "云", "露", "蝶", "燕", "莺", "凤", "凰", "琴"]

    # 后缀词库
    suffixes:
      male: ["剑客", "法师", "弓手", "飞侠", "海盗", "战士", "骑士", "游侠",
             "贤者", "勇士", "行者", "使者", "达人", "高手", "传说", "英雄",
             "王者", "霸主", "大神", "大佬"]
      female: ["仙女", "公主", "精灵", "天使", "舞者", "歌者", "琴师", "画师",
               "花仙", "月神", "星使", "雪女", "梦蝶", "灵儿", "小妹", "姐姐",
               "美眉", "萌妹", "甜心", "宝贝"]

    # 是否添加数字后缀
    add-number-suffix: true
    # 数字后缀范围
    number-range: {min: 100, max: 9999}

  # 公会配置
  guild:
    # 是否显示公会
    enabled: true
    # 有公会的概率 (0.0-1.0)
    probability: 0.7
    # 预设公会名称
    names: ["冒险小队", "星辰公会", "暗夜骑士团", "光明圣殿", "龙之传人",
            "英雄联盟", "梦幻战队", "风暴骑士", "烈焰军团", "冰霜之刃",
            "无名剑客", "天涯海角", "王者归来", "铁血丹心", "义薄云天"]

  # 人气配置
  fame:
    # 最小人气值
    min: -100
    # 最大人气值
    max: 1000

  # 自动刷新配置
  auto-refresh:
    # 是否启用自动刷新
    enabled: false
    # 刷新间隔（分钟）
    interval: 60

  # 行为配置
  behavior:
    # 是否允许假人移动
    allow-movement: false
    # 移动范围（像素）
    movement-range: 200
    # 移动间隔（秒）
    movement-interval: 10

  # 玩家交互配置
  interaction:
    # 是否在玩家进入地图时显示假人
    show-on-enter: true
    # 是否允许玩家点击假人查看信息
    allow-inspect: true
    # 点击假人时显示的信息
    inspect-info:
      show-level: true
      show-job: true
      show-fame: true
      show-guild: true
