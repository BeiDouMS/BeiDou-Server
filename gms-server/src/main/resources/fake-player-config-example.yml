# 假人系统配置示例
# 在 application.yml 中添加以下配置

fake-player:
  # 是否启用假人系统
  enabled: true
  
  # 地图ID -> 假人数量配置
  # 在这些地图上会生成指定数量的假人
  maps:
    100000000: 5   # 维多利亚港 - 市中心
    101000000: 3   # 射手村 - 射手村中心
    102000000: 3   # 魔法密林 - 魔法密林中心
    103000000: 3   # 废弃都市 - 废弃都市中心
    104000000: 3   # 黑暗中的明珠 - 黑暗中的明珠
    105040300: 2   # 赫里希安 - 市中心
    200000000: 4   # 天空之城 - 天空之城广场
    211000000: 3   # 神木村 - 神木村广场
    220000000: 3   # 时间神殿 - 时间神殿入口
    230000000: 3   # 阿里安特 - 阿里安特宫殿
    240000000: 3   # 武陵 - 武陵道场
    250000000: 3   # 地球防御本部 - 地球防御本部
    260000000: 3   # 阿尔卡那 - 阿尔卡那
    261000000: 3   # 莫拉斯 - 莫拉斯中心
    262000000: 3   # 未来都市 - 未来都市
  
  # 是否允许假人随机说话
  allow-chat: true
  
  # 假人说话概率 (0.0-1.0)
  chat-probability: 0.1
  
  # 假人自动刷新间隔（分钟，0=不刷新）
  # 刷新会重新生成假人的外观、职业、等级等
  auto-refresh-minutes: 0
  
  # 是否在玩家进入地图时显示假人
  show-on-enter: true
